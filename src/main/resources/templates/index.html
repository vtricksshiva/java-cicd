<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java Frontend App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">Java Frontend App</a>
    </div>
</nav>

<main class="container my-5">
    <section class="row align-items-center mb-5">
        <div class="col-lg-7">
            <h1 class="display-6">Manage tasks with a modern Java frontend</h1>
            <p class="lead">Use the task board below to create tasks, update status, and preview the live REST API integration.</p>
        </div>
        <div class="col-lg-5 text-center">
            <img src="https://images.pexels.com/photos/3184465/pexels-photo-3184465.jpeg?auto=compress&cs=tinysrgb&w=800" alt="Tasks" class="img-fluid rounded shadow-sm" />
        </div>
    </section>

    <section class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h2 class="card-title">Create a new task</h2>
                    <form id="task-form">
                        <div class="mb-3">
                            <label for="title" class="form-label">Title</label>
                            <input type="text" class="form-control" id="title" placeholder="Task title" required />
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3" placeholder="Task details"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Add Task</button>
                        <div id="form-message" class="mt-3"></div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="card-title">VTricks Technologies bengaluru</h2>
                        <span class="text-muted" id="task-count">0 tasks</span>
                    </div>
                    <div id="task-list" class="list-group"></div>
                </div>
            </div>
        </div>
    </section>
</main>

<footer class="bg-light py-3">
    <div class="container text-center">
        <small>Built with Spring Boot, Thymeleaf, and Bootstrap. Deploy to Tomcat on EC2.</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
